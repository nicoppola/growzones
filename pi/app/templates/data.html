{% extends "base.html" %}
{% block content %}

<h2>Data</h2>

<div class="card">
  <h3 style="margin-top: 0;">Download</h3>

  <div class="control-group">
    <label for="from-date">From</label>
    <input type="date" id="from-date">
  </div>
  <div class="control-group">
    <label for="to-date">To</label>
    <input type="date" id="to-date">
  </div>

  <div class="row" style="margin-top: 8px;">
    <button id="btn-download-range">Download range</button>
    <button id="btn-download-today" class="secondary">Today</button>
    <button id="btn-download-all" class="secondary">Everything</button>
  </div>
  <p id="download-status" class="hint" style="margin-top: 12px;"></p>
</div>

<dialog id="confirm-download">
  <h3 style="margin-top: 0;">Confirm download</h3>
  <dl class="kv" id="confirm-summary"></dl>
  <p class="hint" id="confirm-estimate" style="margin-top: 14px;"></p>
  <div class="row" style="margin-top: 16px; justify-content: flex-end;">
    <button id="confirm-cancel" class="secondary">Cancel</button>
    <button id="confirm-proceed">Download</button>
  </div>
</dialog>

<div class="card">
  <h3 style="margin-top: 0;">Storage</h3>
  <div class="row" style="gap: 24px; margin-bottom: 18px;">
    <div>
      <div class="muted hint">Captures</div>
      <div id="stor-captures" style="font-size: 20px;">—</div>
    </div>
    <div>
      <div class="muted hint">Disk free</div>
      <div id="stor-free" style="font-size: 20px;">—</div>
    </div>
    <div>
      <div class="muted hint">Days</div>
      <div id="stor-days" style="font-size: 20px;">{{ storage.by_day | length }}</div>
    </div>
  </div>

  <div class="disk-bar">
    <div id="bar-captures" class="bar-seg" title="Captures"></div>
    <div id="bar-other"    class="bar-seg" title="Other OS use"></div>
    <div id="bar-free"     class="bar-seg" title="Free"></div>
  </div>

  <h4 style="margin: 20px 0 10px;">Per-day breakdown</h4>
  <table id="day-table">
    <thead>
      <tr><th>Date</th><th style="text-align:right;">Images</th><th style="text-align:right;">Size</th><th></th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <div style="margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border);">
    <h4 style="margin: 0 0 10px;">Delete range</h4>
    <div class="row">
      <input type="date" id="del-from">
      <span class="muted">→</span>
      <input type="date" id="del-to">
      <button id="btn-delete-range" class="danger">Delete range</button>
      <span id="delete-status" class="hint"></span>
    </div>
  </div>
</div>

<style>
  .control-group { margin-bottom: 12px; }
  .control-group label { font-size: 14px; display: block; margin-bottom: 4px; }
  input[type="date"] {
    background: var(--panel-soft);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color-scheme: dark;
  }
  .disk-bar {
    display: flex;
    height: 14px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--panel-soft);
  }
  .bar-seg { height: 100%; }
  #bar-captures { background: var(--accent); }
  #bar-other    { background: var(--border); }
  #bar-free     { background: var(--good); opacity: 0.5; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th { text-align: left; color: var(--muted); font-weight: 500; }
  td button.danger {
    background: transparent;
    color: var(--bad);
    border: 1px solid var(--bad);
    padding: 4px 10px;
    font-weight: 500;
  }
  td button.danger:hover { background: var(--bad); color: #1a1a1a; }
  td button.danger.armed { background: var(--bad); color: #1a1a1a; }
  dialog {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    min-width: 360px;
  }
  dialog::backdrop { background: rgba(0, 0, 0, 0.6); }
</style>

<script>
  window.GROWZONES = {
    initialStorage: {{ storage | tojson }},
  };
</script>
<script src="/static/data.js"></script>

{% endblock %}
