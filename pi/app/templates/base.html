<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GrowZones — {{ title or "Pi" }}</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1b2027;
      --panel-soft: #232932;
      --text: #e5e7eb;
      --muted: #8a93a3;
      --accent: #f4d03f;
      --accent-dim: #b58e1c;
      --good: #4ade80;
      --warn: #fbbf24;
      --bad: #f87171;
      --border: #2c333d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    header h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: 0.5px;
    }
    nav { display: flex; gap: 4px; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
    }
    nav a.active { color: var(--accent); background: var(--panel-soft); }
    nav a:hover:not(.active) { color: var(--text); background: var(--panel-soft); }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }
    h2 { font-size: 20px; margin-top: 0; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 18px;
    }
    .muted { color: var(--muted); }
    .hint { color: var(--muted); font-size: 13px; }
    button, .button {
      background: var(--accent);
      color: #1a1a1a;
      border: 0;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: var(--accent-dim); color: var(--text); }
    button:disabled { background: var(--panel-soft); color: var(--muted); cursor: not-allowed; }
    button.secondary {
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover { background: var(--border); }
    button.danger { background: var(--bad); color: #1a1a1a; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .badge.good { background: rgba(74, 222, 128, 0.15); color: var(--good); }
    .badge.warn { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
    .badge.bad  { background: rgba(248, 113, 113, 0.15); color: var(--bad); }
    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      overflow-x: auto;
    }
    .preview-frame {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: 6px;
      display: block;
    }
    .log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .log .step { color: var(--accent); }
    .log .result { color: var(--good); }
    .log .warn { color: var(--warn); }
    .log .error { color: var(--bad); }
    .kv {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 6px 16px;
      font-size: 14px;
    }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  </style>
</head>
<body>
  <header>
    <h1>GrowZones <span class="muted" style="font-weight: 400; font-size: 13px;">{{ request.url.hostname or 'pi' }}</span></h1>
    <nav>
      <a href="/setup"   class="{{ 'active' if active_tab == 'setup' else '' }}">Setup</a>
      <a href="/live"    class="{{ 'active' if active_tab == 'live' else '' }}">Live</a>
      <a href="/capture" class="{{ 'active' if active_tab == 'capture' else '' }}">Capture</a>
      <a href="/data"    class="{{ 'active' if active_tab == 'data' else '' }}">Data</a>
    </nav>
  </header>
  <main>
    {% block content %}{{ content_html | safe if content_html else '' }}{% endblock %}
  </main>
</body>
</html>
